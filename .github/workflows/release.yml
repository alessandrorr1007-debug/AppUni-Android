name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT

          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Set version in build.gradle.kts
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ steps.version.outputs.VERSION_CODE }}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ steps.version.outputs.VERSION }}\"/" app/build.gradle.kts

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          keytool -genkeypair -v \
            -keystore release-key.jks \
            -alias appuni \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass appuni123 \
            -dname "CN=AppUni, OU=Dev, O=AppUni, L=Lima, ST=Lima, C=PE"

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)

          $BUILD_TOOLS/zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

          $BUILD_TOOLS/apksigner sign \
            --ks release-key.jks \
            --ks-key-alias appuni \
            --ks-pass pass:appuni123 \
            --out app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

          rm -f app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f app/build/outputs/apk/release/app-release-aligned.apk

      - name: Verify signed APK exists
        run: |
          ls -la app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AgendaPx v${{ steps.version.outputs.VERSION }}"
          body: |
            ## AgendaPx v${{ steps.version.outputs.VERSION }}

            ### Instalación
            1. Descarga el APK desde la sección Assets.
            2. Habilita la instalación desde fuentes desconocidas.
            3. Instala la aplicación.

            ### Notas
            - Requiere Android 7.0 (API 24) o superior.
            - Se recomienda eliminar versiones antiguas si existe conflicto.

          files: |
            app/build/outputs/apk/release/app-release.apk

          draft: false
          prerelease: false
          generate_release_notes: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}