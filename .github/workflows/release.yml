name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          # Extract versionCode from version (e.g., 1.2.3 -> 10203)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Set version in build.gradle.kts
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ steps.version.outputs.VERSION_CODE }}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ steps.version.outputs.VERSION }}\"/" app/build.gradle.kts

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK (debug key for distribution)
        run: |
          # Generate a debug keystore for signing
          keytool -genkeypair -v -keystore release-key.jks -alias agendapx -keyalg RSA -keysize 2048 -validity 10000 -storepass agendapx123 -dname "CN=AgendaPx, OU=Dev, O=AgendaPx, L=Lima, ST=Lima, C=PE"
          # Align the APK
          zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-aligned.apk || true
          # Sign with apksigner
          apksigner sign --ks release-key.jks --ks-key-alias agendapx --ks-pass pass:agendapx123 --out app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release-unsigned.apk || true

      - name: Fallback: Use debug APK if release signing fails
        if: failure()
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/app-release.apk || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AgendaPx v${{ steps.version.outputs.VERSION }}"
          body: |
            ## AgendaPx v${{ steps.version.outputs.VERSION }}

            ### Instalación
            1. Descarga el APK desde abajo
            2. Habilita "Fuentes desconocidas" en tu dispositivo
            3. Instala el APK

            ### Notas
            - Requiere Android 7.0 (API 24) o superior
            - Se recomienda desinstalar versiones anteriores si hay conflictos
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
